{% extends "layout.html" %}
{% set title = "Vulnerabilities" %}

{% block content %}
<h2 class="mb-4">All Discovered Findings</h2>

<div class="card shadow-sm">
    <div class="card-header bg-danger text-white">
        <i class="fas fa-bug me-2"></i> Comprehensive Findings List
    </div>
    <div class="card-body">
        <div id="all-vulnerabilities-container">
            <div class="text-center text-muted py-4">Loading findings...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const vulnContainer = document.getElementById('all-vulnerabilities-container');

        async function fetchAllVulnerabilities() {
            vulnContainer.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin me-2"></i> Loading findings...</div>';
            const response = await fetch('/api/vulnerabilities');
            const data = await response.json();

            if (data.success && data.vulnerabilities.length > 0) {
                renderVulnerabilities(data.vulnerabilities);
            } else {
                vulnContainer.innerHTML = '<div class="text-center text-muted py-4">No findings yet</div>';
            }
        }

        function renderVulnerabilities(vulnerabilities) {
            let html = `<table class="table table-hover vuln-table"><thead><tr>
                            <th>Severity</th>
                            <th>Type</th>
                            <th>Target</th>
                            <th>Description</th>
                            <th>Scan ID</th>
                            <th>Time</th>
                            <th>Actions</th>
                        </tr></thead><tbody>`;
            vulnerabilities.forEach(vuln => {
                const severityClass = getSeverityClass(vuln.severity);
                html += `<tr>
                            <td><span class="${severityClass}">${vuln.severity}</span></td>
                            <td>${vuln.type}</td>
                            <td><a href="${vuln.target}" target="_blank" title="${vuln.target}">${truncateUrl(vuln.target, 30)}</a></td>
                            <td>${vuln.description}</td>
                            <td><a href="/scan/${vuln.scan_id}">${vuln.scan_id.substring(0, 8)}...</a></td>
                            <td>${new Date(vuln.timestamp).toLocaleString()}</td>
                            <td><button class="btn btn-sm btn-outline-info view-evidence-btn" data-bs-toggle="modal" data-bs-target="#evidenceModal" data-evidence='${JSON.stringify(vuln.evidence)}'><i class="fas fa-file-alt"></i> Evidence</button></td>
                        </tr>`;
            });
            html += `</tbody></table>`;
            vulnContainer.innerHTML = html;
        }

        fetchAllVulnerabilities();
    });
</script>
{% endblock %}
