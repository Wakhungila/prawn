# PRAWN Default Configuration

general:
  threads: 10
  timeout: 30
  user_agent: 'PRAWN/0.1.0'
  verbose: false

recon:
  enabled: true
  subdomain_enumeration: true
  port_scanning: true
  service_detection: true
  web_crawling: true
  screenshot: true
  tools:
    subfinder: true
    amass: true
    assetfinder: true
    httpx: true
    nmap: true
    masscan: true

vuln_testing:
  enabled: true
  xss: true
  sqli: true
  ssrf: true
  xxe: true
  file_inclusion: true
  command_injection: true
  path_traversal: true
  open_redirect: true
  csrf: true
  cors: true
  tools:
    nuclei: true
    sqlmap: true
    wfuzz: true
    ffuf: true

exploitation:
  enabled: true
  auto_exploit: true  # Default to false for safety
  exploit_xss: true
  exploit_sqli: true
  exploit_rce: true

reporting:
  output_format: 'markdown'
  include_screenshots: true
  include_poc: true
  include_remediation: true

tools:
  nmap_path: 'nmap'
  sqlmap_path: 'sqlmap'
  ffuf_path: 'ffuf'
  nuclei_path: 'nuclei'
  burp_proxy: 'http://127.0.0.1:8080'

# Severity thresholds for reporting
severity_thresholds:
  critical: 9.0
  high: 7.0
  medium: 4.0
  low: 0.1

# Proxy settings
proxy:
  enabled: false
  http: ''
  https: ''
  no_proxy: 'localhost,127.0.0.1'

# Rate limiting to avoid detection
rate_limiting:
  enabled: true
  requests_per_second: 10
  delay_between_requests: 0.1

# Authentication settings
authentication:
  enabled: false
  username: ''
  password: ''
  token: ''
  cookie: ''

# Headers to include in requests
headers:
  User-Agent: 'PRAWN/0.1.0'
  Accept: 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8'
  Accept-Language: 'en-US,en;q=0.5'
  Accept-Encoding: 'gzip, deflate'
  Connection: 'keep-alive'
  Upgrade-Insecure-Requests: '1'