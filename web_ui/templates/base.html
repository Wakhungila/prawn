<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PIN0CCHI0 Security Testing Framework{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Sidebar layout additions */
        .sidebar {
            position: fixed;
            top: 56px; /* below navbar height */
            left: 0;
            bottom: 0;
            width: 250px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 14px 10px;
            overflow-y: auto;
        }
        .sidebar .nav-link { display: block; padding: 10px 12px; border-radius: 10px; color: var(--muted)!important; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text)!important; }
        .sidebar .nav-section { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 8px 8px; }
        .content-with-sidebar { margin-left: 250px; }
        @media (max-width: 992px) {
            .sidebar { position: static; width: 100%; height: auto; top: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
            .content-with-sidebar { margin-left: 0; }
        }
    /* AI Chat widget styles */
        .ai-chat-widget { position: fixed; right: 20px; bottom: 24px; z-index: 1050; }
        .ai-chat-toggle { width: 54px; height: 54px; border-radius: 50%; border: none; background: #0d6efd; color: #fff; box-shadow: 0 6px 18px rgba(13,110,253,.35); }
        .ai-chat-toggle:hover { background: #0b5ed7; }
        .ai-chat-panel { position: fixed; right: 20px; bottom: 90px; width: 360px; max-height: 65vh; background: #111827; color: #e5e7eb; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.35); display: flex; flex-direction: column; overflow: hidden; }
        .ai-chat-panel.hidden { display: none; }
        .ai-chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .ai-chat-messages { padding: 10px 12px; overflow-y: auto; flex: 1; }
        .ai-msg { margin: 8px 0; display: flex; }
        .ai-msg .bubble { padding: 8px 12px; border-radius: 12px; max-width: 80%; line-height: 1.3; white-space: pre-wrap; }
        .ai-msg.user { justify-content: flex-end; }
        .ai-msg.user .bubble { background: #0d6efd; color: #fff; border-top-right-radius: 4px; }
        .ai-msg.assistant { justify-content: flex-start; }
        .ai-msg.assistant .bubble { background: rgba(255,255,255,0.08); color: #e5e7eb; border-top-left-radius: 4px; }
        .ai-chat-controls { padding: 10px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); display: flex; align-items: center; }
        #ai-mic-btn.recording { color: #dc3545; border-color: #dc3545; }
        @media (max-width: 480px) { .ai-chat-panel { right: 10px; left: 10px; width: auto; } }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-robot me-2"></i>PIN0CCHI0
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">
                            <i class="fas fa-tachometer-alt me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == url_for('scans') %}active{% endif %}" href="{{ url_for('scans') }}">
                            <i class="fas fa-search me-1"></i> Scans
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == url_for('vulnerabilities') %}active{% endif %}" href="{{ url_for('vulnerabilities') }}">
                            <i class="fas fa-bug me-1"></i> Vulnerabilities
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="sidebar">
        <div class="nav-section">Navigation</div>
        <a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="fas fa-gauge-high me-2"></i> Dashboard
        </a>
        <a class="nav-link" href="{{ url_for('index') }}#scan-form">
            <i class="fas fa-rocket me-2"></i> New Scan
        </a>
        <a class="nav-link {% if request.path == url_for('scans') %}active{% endif %}" href="{{ url_for('scans') }}">
            <i class="fas fa-list-check me-2"></i> Scans
        </a>
        <a class="nav-link {% if request.path == url_for('vulnerabilities') %}active{% endif %}" href="{{ url_for('vulnerabilities') }}">
            <i class="fas fa-bug me-2"></i> Vulnerabilities
        </a>
        <div class="nav-section">Agent</div>
        <a class="nav-link" href="{{ url_for('index') }}#autonomous">
            <i class="fas fa-robot me-2"></i> Autonomous
        </a>
        <a class="nav-link" href="{{ url_for('index') }}#activity">
            <i class="fas fa-wave-square me-2"></i> Activity
        </a>
    </div>
    <div class="content-with-sidebar">
        <div class="container-fluid mt-4">
            {% block content %}{% endblock %}
        </div>
    </div>

    </div>
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">PIN0CCHI0 Security Testing Framework &copy; <script>document.write(new Date().getFullYear())</script></span>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- AI Chat Widget -->
    <div id="ai-chat-widget" class="ai-chat-widget">
        <button id="ai-chat-toggle" class="ai-chat-toggle" title="Jarvis Chat">
            <i class="fas fa-comments"></i>
        </button>
        <div id="ai-chat-panel" class="ai-chat-panel hidden">
            <div class="ai-chat-header">
                <div><i class="fas fa-robot me-2"></i>Jarvis</div>
                <button id="ai-chat-close" class="btn btn-sm btn-outline-light" title="Close">&times;</button>
            </div>
            <div id="ai-chat-messages" class="ai-chat-messages"></div>
            <div class="ai-chat-controls">
                <div class="form-check form-switch me-2">
                    <input class="form-check-input" type="checkbox" id="ai-tts-toggle">
                    <label class="form-check-label small" for="ai-tts-toggle" title="Speak replies">Speak</label>
                </div>
                <button id="ai-mic-btn" class="btn btn-sm btn-outline-secondary me-2" title="Voice input">
                    <i class="fas fa-microphone"></i>
                </button>
                <div class="input-group">
                    <input id="ai-chat-input" type="text" class="form-control" placeholder="Talk to Jarvis...">
                    <button id="ai-chat-send" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function(){
        const panel = document.getElementById('ai-chat-panel');
        const toggleBtn = document.getElementById('ai-chat-toggle');
        const closeBtn = document.getElementById('ai-chat-close');
        const messagesEl = document.getElementById('ai-chat-messages');
        const inputEl = document.getElementById('ai-chat-input');
        const sendBtn = document.getElementById('ai-chat-send');
        const micBtn = document.getElementById('ai-mic-btn');
        const ttsToggle = document.getElementById('ai-tts-toggle');

        const OLLAMA_MODEL = (window.PIN0CCHI0_OLLAMA_MODEL || null);
        const MAX_HISTORY = 12; // messages to retain (combined user/assistant entries)
        let history = [];

        function addMessage(role, text) {
            const wrap = document.createElement('div');
            wrap.className = 'ai-msg ' + (role === 'assistant' ? 'assistant' : 'user');
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            wrap.appendChild(bubble);
            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function speak(text) {
            try {
                if (!('speechSynthesis' in window)) return;
                if (!ttsToggle.checked) return;
                const u = new SpeechSynthesisUtterance(text);
                u.rate = 1; u.pitch = 1; u.volume = 1;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(u);
            } catch(e) {}
        }

        async function sendMessage() {
            const text = (inputEl.value || '').trim();
            if (!text) return;
            inputEl.value = '';
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            if (history.length > MAX_HISTORY) history = history.slice(history.length - MAX_HISTORY);

            // Build payload with compact history
            const payload = { message: text, history: history.slice(-MAX_HISTORY) };
            if (OLLAMA_MODEL) payload.model = OLLAMA_MODEL;

            try {
                const res = await fetch('/api/ai_chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const jr = await res.json();
                if (!res.ok || !jr.success) throw new Error(jr.error || ('HTTP ' + res.status));
                const reply = jr.reply || '';
                addMessage('assistant', reply);
                history.push({ role: 'assistant', content: reply });
                if (history.length > MAX_HISTORY) history = history.slice(history.length - MAX_HISTORY);
                speak(reply);
            } catch (e) {
                addMessage('assistant', 'Error: ' + (e.message || 'Failed to contact AI backend'));
            }
        }

        // UI events
        toggleBtn.addEventListener('click', () => panel.classList.toggle('hidden'));
        closeBtn.addEventListener('click', () => panel.classList.add('hidden'));
        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Voice input
        let recognizing = false;
        let recognition = null;
        try {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SR) {
                recognition = new SR();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                recognition.onresult = (event) => {
                    const t = event.results && event.results[0] && event.results[0][0] ? event.results[0][0].transcript : '';
                    if (t) {
                        inputEl.value = t;
                        sendMessage();
                    }
                };
                recognition.onend = () => { recognizing = false; micBtn.classList.remove('recording'); };
                micBtn.addEventListener('click', () => {
                    if (!recognition) return;
                    if (recognizing) { try { recognition.stop(); } catch(e){}; return; }
                    try { recognition.start(); recognizing = true; micBtn.classList.add('recording'); } catch(e){}
                });
            } else {
                micBtn.disabled = true;
                micBtn.title = 'Voice not supported by this browser';
            }
        } catch(e) {
            micBtn.disabled = true;
            micBtn.title = 'Voice initialization error';
        }

        // Seed greeting
        addMessage('assistant', 'Hello. I am Jarvis. How can I help?');
    })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
