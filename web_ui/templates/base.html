<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PIN0CCHI0 Security Testing Framework{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Sidebar layout additions */
        .sidebar {
            position: fixed;
            top: 56px; /* below navbar height */
            left: 0;
            bottom: 0;
            width: 250px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 14px 10px;
            overflow-y: auto;
        }
        .sidebar .nav-link { display: block; padding: 10px 12px; border-radius: 10px; color: var(--muted)!important; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text)!important; }
        .sidebar .nav-section { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 8px 8px; }
        .content-with-sidebar { margin-left: 250px; }
        @media (max-width: 992px) {
            .sidebar { position: static; width: 100%; height: auto; top: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
            .content-with-sidebar { margin-left: 0; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-robot me-2"></i>PIN0CCHI0
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">
                            <i class="fas fa-tachometer-alt me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == url_for('scans') %}active{% endif %}" href="{{ url_for('scans') }}">
                            <i class="fas fa-search me-1"></i> Scans
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == url_for('vulnerabilities') %}active{% endif %}" href="{{ url_for('vulnerabilities') }}">
                            <i class="fas fa-bug me-1"></i> Vulnerabilities
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="sidebar">
        <div class="nav-section">Navigation</div>
        <a class="nav-link {% if request.path == url_for('index') %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="fas fa-gauge-high me-2"></i> Dashboard
        </a>
        <a class="nav-link" href="{{ url_for('index') }}#scan-form">
            <i class="fas fa-rocket me-2"></i> New Scan
        </a>
        <a class="nav-link {% if request.path == url_for('scans') %}active{% endif %}" href="{{ url_for('scans') }}">
            <i class="fas fa-list-check me-2"></i> Scans
        </a>
        <a class="nav-link {% if request.path == url_for('vulnerabilities') %}active{% endif %}" href="{{ url_for('vulnerabilities') }}">
            <i class="fas fa-bug me-2"></i> Vulnerabilities
        </a>
        <div class="nav-section">Agent</div>
        <a class="nav-link" href="{{ url_for('index') }}#autonomous">
            <i class="fas fa-robot me-2"></i> Autonomous
        </a>
        <a class="nav-link" href="{{ url_for('index') }}#activity">
            <i class="fas fa-wave-square me-2"></i> Activity
        </a>
    </div>
    <div class="content-with-sidebar">
        <div class="container-fluid mt-4">
            {% block content %}{% endblock %}
        </div>
    </div>

    </div>
    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">PIN0CCHI0 Security Testing Framework &copy; <script>document.write(new Date().getFullYear())</script></span>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
